version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: campusconnect-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sandi_2006
      MYSQL_DATABASE: campusconnect
      MYSQL_USER: root
      MYSQL_PASSWORD: sandi_2006
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: campusconnect-backend
    depends_on:
      - db
    ports:
      - '8081:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/campusconnect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=sandi_2006
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      - JWT_EXPIRATION=86400000
      - AUTH_ALLOWED_DOMAINS=college.edu,anurag.edu.in
    command: ./mvnw spring-boot:run -Dspring-boot.run.arguments='--server.port=8080'

  frontend:
    build:
      context: ./frontend
    container_name: campusconnect-frontend
    depends_on:
      - backend
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://backend:8080/api
    command: npm start

volumes:
  db_data:
