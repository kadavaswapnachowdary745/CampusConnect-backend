spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://dpg-d6qi5394tr6s73fq22s0-a.singapore-postgres.render.com:5432/campusconnect_db_lv9u?sslmode=require}
spring.datasource.username=${JDBC_DATABASE_USERNAME:campusconnect_db_lv9u_user}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:Hzqo86tm3AS9D3kGqwwt8m5BvJHf2EjM}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari / pool tuning (Spring Boot 3 defaults to HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.ssl=true

server.port=8080

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Secret (Should be moved to ENV vars in prod)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Fake payment mode (no Razorpay library needed)
payment.currency=INR
payment.mock.enabled=true

# Allowed college domains for sign up
auth.allowed-domains=college.edu,anurag.edu.in

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

