<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Confirmation</title>
  <style>
    body { margin: 0; font-family: Inter, 'Segoe UI', Roboto, sans-serif; background: #f4f5f7; color: #111827; }
    .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 16px; padding: 30px; max-width: 460px; width: 100%; box-shadow: 0 12px 28px rgba(15,23,42,.12); }
    h1 { margin: 0; font-size: 1.8rem; }
    p { margin: 12px 0; color: #4b5563; }
    .status { margin-top: 16px; font-size: 1rem; padding: 14px; border: 1px solid #d1fae5; background: #dcfce7; color: #166534; border-radius: 10px; }
    .button { margin-top: 18px; display: inline-flex; align-items: center; justify-content: center; background: #2563eb; color: white; border: none; padding: 11px 16px; border-radius: 8px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Payment Successful ✅</h1>
      <p>Your order has been processed and marked PAID.</p>
      <div id="orderDetails" class="status">Loading order details...</div>
      <a class="button" href="/index.html">Back to Shop</a>
    </div>
  </div>
  <script>
    function parseParams() {
      const q = location.search.substring(1);
      return Object.fromEntries(new URLSearchParams(q));
    }

    const params = parseParams();
    const container = document.getElementById('orderDetails');
    const orderId = params.order || 'N/A';
    const status = params.status || 'PAID';

    container.textContent = `Order ID: ${orderId} / Status: ${status}`;
  </script>
</body>
</html>
